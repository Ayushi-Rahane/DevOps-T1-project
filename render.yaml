# render.yaml — Render Blueprint (Infrastructure as Code)
# All services use FREE tier (type: web) — no payment required
# Usage: Render Dashboard → Blueprints → New Blueprint Instance → Select this repo

services:
  # ─── 1. Auth Service (Free Web Service) ────────────────────
  - type: web
    name: issuesphere-auth
    runtime: node
    plan: free
    rootDir: auth-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5001
      - key: AUTH_MONGO_URI
        sync: false   # Set manually in Render Dashboard
      - key: JWT_SECRET
        sync: false   # Set manually in Render Dashboard
      - key: JWT_EXPIRES_IN
        value: 7d

  # ─── 2. Complaint Service (Free Web Service) ───────────────
  - type: web
    name: issuesphere-complaint
    runtime: node
    plan: free
    rootDir: complaint-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5002
      - key: COMPLAINT_MONGO_URI
        sync: false   # Set manually in Render Dashboard
      - key: JWT_SECRET
        sync: false   # Set manually in Render Dashboard
      - key: NOTIFICATION_SERVICE_URL
        sync: false   # Set to: https://issuesphere-notification.onrender.com/log

  # ─── 3. Notification Service (Free Web Service) ────────────
  - type: web
    name: issuesphere-notification
    runtime: node
    plan: free
    rootDir: notification-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5003
      - key: NOTIFICATION_MONGO_URI
        sync: false   # Set manually in Render Dashboard
      - key: JWT_SECRET
        sync: false   # Set manually in Render Dashboard

  # ─── 4. API Gateway (Free Web Service — public entry point) ─
  - type: web
    name: issuesphere-gateway
    runtime: node
    plan: free
    rootDir: api-gateway
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5005
      - key: AUTH_SERVICE_URL
        sync: false   # Set to: https://issuesphere-auth.onrender.com
      - key: COMPLAINT_SERVICE_URL
        sync: false   # Set to: https://issuesphere-complaint.onrender.com
      - key: NOTIFICATION_SERVICE_URL
        sync: false   # Set to: https://issuesphere-notification.onrender.com

  # ─── 5. Frontend (Static Site — served by Render CDN) ──────
  - type: web
    name: issuesphere-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false   # Set to: https://issuesphere-gateway.onrender.com/api
